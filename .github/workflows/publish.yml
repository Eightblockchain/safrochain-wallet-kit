name: Publish to npm

on:
  push:
    tags:
      - 'v*'                         # npm version patch/minor/major → v0.3.1
      - '@safrochain/wallet-kit@*'   # manual tags → @safrochain/wallet-kit@0.3.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so release notes span all commits

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # auto-builds changelog from commits/PRs
          make_latest: true
