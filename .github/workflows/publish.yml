name: Publish to npm

on:
  push:
    tags:
      - 'v*'                         # npm version patch/minor/major → v0.3.1
      - '@safrochain/wallet-kit@*'   # manual tags → @safrochain/wallet-kit@0.3.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
